spring.application.name=test-telecome
server.port=8080
server.address=0.0.0.0




spring.datasource.url=jdbc:mysql://supervision-db:3306/telecom_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false



spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.initialization-fail-timeout=120000


spring.web.cors.allowed-origins=http://10.0.4.10,http://localhost,http://127.0.0.1
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*



clab.container.prefix=clab-telecom-supervision-
clab.topology.name=telecom-supervision



ssh.default.username=root
ssh.default.password=toor
ssh.default.port=22
ssh.connect.timeout=5000
ssh.command.timeout=10000




ai.engine.url=http://supervision-ai:5000



logging.level.com.example.demo=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN
logging.file.name=/app/logs/spring-boot.log
